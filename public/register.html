<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AeroChat</title>
    <link rel="stylesheet" href="style.css">
    <script src="theme.js"></script>
    <script>
        // Redirect to chat if already logged in
        if (localStorage.getItem("token")) {
            window.location.href = "chat.html";
        }
        
        // Zero-FOUC Theme Pre-loader
        const root = document.documentElement;
        const mode = localStorage.getItem("themeMode") || "light";
        if (mode === "light" || (mode === "system" && !window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            root.classList.add("light-mode");
        }
        if (localStorage.getItem("themePrimary")) {
            root.style.setProperty("--primary", localStorage.getItem("themePrimary"));
            root.style.setProperty("--primary-hover", localStorage.getItem("themeHover"));
            root.style.setProperty("--wa-green", localStorage.getItem("themePrimary"));
        }
        const fontSizes = { 'small': '12px', 'medium': '14px', 'large': '16px' };
        root.style.setProperty('--base-font-size', fontSizes[localStorage.getItem("themeFontSize")] || '14px');
        root.style.setProperty('--compact-factor', localStorage.getItem("themeCompact") === "true" ? '0.75' : '1');
        if (localStorage.getItem("themeAnimations") === "false") {
            root.classList.add("no-animations");
        }
    </script>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>AeroChat</h1>
                <p>Create your account and start chatting</p>
            </div>

            <!-- Custom alert box for user messages -->
            <div id="alert" class="alert-box"></div>

            <form id="registerForm" onsubmit="event.preventDefault(); register();" style="display: flex; flex-direction: column; gap: 18px;">
                <!-- Profile Picture Selection Section -->
                <div class="form-group" style="align-items: center; gap: 10px;">
                    <label style="align-self: flex-start;">Profile Picture</label>
                    <div class="avatar-setup-container">
                        <div id="avatarPreview" class="avatar-preview-lg preset-coral">
                            <span id="avatarPreviewInitials">U</span>
                        </div>
                        <input type="file" id="avatarUpload" accept="image/*" style="display: none;" onchange="handleCustomAvatarUpload(event)">
                        <button type="button" class="btn-secondary-sm" onclick="document.getElementById('avatarUpload').click()">Upload Custom</button>
                    </div>
                    <div class="preset-avatars-grid">
                        <div class="preset-avatar-opt preset-coral active" onclick="selectPresetAvatar('preset:coral')" title="Coral"></div>
                        <div class="preset-avatar-opt preset-teal" onclick="selectPresetAvatar('preset:teal')" title="Teal"></div>
                        <div class="preset-avatar-opt preset-blue" onclick="selectPresetAvatar('preset:blue')" title="Blue"></div>
                        <div class="preset-avatar-opt preset-purple" onclick="selectPresetAvatar('preset:purple')" title="Purple"></div>
                        <div class="preset-avatar-opt preset-orange" onclick="selectPresetAvatar('preset:orange')" title="Orange"></div>
                        <div class="preset-avatar-opt preset-pink" onclick="selectPresetAvatar('preset:pink')" title="Pink"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="name">Full Name</label>
                    <div class="input-wrapper">
                        <input id="name" type="text" placeholder="Enter your full name" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="mobileNumber">Mobile Number</label>
                    <div class="input-wrapper">
                        <input id="mobileNumber" type="text" placeholder="e.g. +1234567890" required>
                    </div>
                </div>


                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input id="password" type="password" placeholder="Create a password" required autocomplete="new-password">
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="input-wrapper">
                        <input id="confirmPassword" type="password" placeholder="Repeat your password" required autocomplete="new-password">
                    </div>
                </div>

                <button type="submit" class="btn-primary">
                    Register
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html" class="auth-link">Login</a>
            </div>
        </div>
    </div>

    <script src="register.js"></script>
</body>
</html>
