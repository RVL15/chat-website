<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AeroChat</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="manifest" href="manifest.json?v=2">
    <script src="theme.js?v=2"></script>
    <script>
        // Redirect to chat if already logged in
        if (localStorage.getItem("token")) {
            window.location.href = "chat.html";
        }
        
        // Zero-FOUC Theme Pre-loader
        const root = document.documentElement;
        const mode = localStorage.getItem("themeMode") || "light";
        if (mode === "light" || (mode === "system" && !window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            root.classList.add("light-mode");
        }
        if (localStorage.getItem("themePrimary")) {
            root.style.setProperty("--primary", localStorage.getItem("themePrimary"));
            root.style.setProperty("--primary-hover", localStorage.getItem("themeHover"));
            root.style.setProperty("--wa-green", localStorage.getItem("themePrimary"));
        }
        const fontSizes = { 'small': '12px', 'medium': '14px', 'large': '16px' };
        root.style.setProperty('--base-font-size', fontSizes[localStorage.getItem("themeFontSize")] || '14px');
        root.style.setProperty('--compact-factor', localStorage.getItem("themeCompact") === "true" ? '0.75' : '1');
        if (localStorage.getItem("themeAnimations") === "false") {
            root.classList.add("no-animations");
        }
    </script>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>AeroChat</h1>
                <p>Welcome back! Please login to your account</p>
            </div>

            <!-- Custom alert box for user messages -->
            <div id="alert" class="alert-box"></div>

            <form id="loginForm" onsubmit="event.preventDefault(); login();" style="display: flex; flex-direction: column; gap: 20px;">
                <div class="form-group">
                    <label for="mobileNumber">Mobile Number</label>
                    <div class="input-wrapper">
                        <input id="mobileNumber" type="text" placeholder="Enter mobile number" required autocomplete="tel">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input id="password" type="password" placeholder="Enter password" required autocomplete="current-password">
                    </div>
                </div>

                <button type="submit" class="btn-primary">
                    Login
                </button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="register.html" class="auth-link">Register</a>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
