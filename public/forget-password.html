<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forget Password - AeroChat</title>
    <link rel="stylesheet" href="style.css">
    <script src="theme.js"></script>
    <script>
        // Zero-FOUC Theme Pre-loader
        const root = document.documentElement;
        const mode = localStorage.getItem("themeMode") || "light";
        if (mode === "light" || (mode === "system" && !window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            root.classList.add("light-mode");
        }
        if (localStorage.getItem("themePrimary")) {
            root.style.setProperty("--primary", localStorage.getItem("themePrimary"));
            root.style.setProperty("--primary-hover", localStorage.getItem("themeHover"));
            root.style.setProperty("--wa-green", localStorage.getItem("themePrimary"));
        }
        const fontSizes = { 'small': '12px', 'medium': '14px', 'large': '16px' };
        root.style.setProperty('--base-font-size', fontSizes[localStorage.getItem("themeFontSize")] || '14px');
        root.style.setProperty('--compact-factor', localStorage.getItem("themeCompact") === "true" ? '0.75' : '1');
        if (localStorage.getItem("themeAnimations") === "false") {
            root.classList.add("no-animations");
        }
    </script>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Reset Password</h1>
                <p>Enter your mobile number and new password</p>
            </div>

            <div id="alert" class="alert-box"></div>

            <form id="resetForm" onsubmit="event.preventDefault(); resetPassword();" style="display: flex; flex-direction: column; gap: 20px;">
                <div class="form-group">
                    <label for="mobileNumber">Mobile Number</label>
                    <div class="input-wrapper">
                        <input id="mobileNumber" type="text" placeholder="Enter mobile number" required autocomplete="tel">
                    </div>
                </div>

                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <div class="input-wrapper">
                        <input id="newPassword" type="password" placeholder="Enter new password" required>
                    </div>
                </div>

                <button type="submit" class="btn-primary">
                    Reset Password
                </button>
            </form>

            <div class="auth-footer">
                Remember your password? <a href="login.html" class="auth-link">Login</a>
            </div>
        </div>
    </div>

    <script src="forget-password.js"></script>
</body>
</html>
