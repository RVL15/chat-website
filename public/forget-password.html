<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forget Password - AeroChat</title>
    <link rel="stylesheet" href="style.css">
    <script>
        if (localStorage.getItem("theme") === "light") {
            document.documentElement.classList.add("light-mode");
        }
    </script>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Reset Password</h1>
                <p>Enter your mobile number and new password</p>
            </div>

            <div id="alert" class="alert-box"></div>

            <form id="resetForm" onsubmit="event.preventDefault(); resetPassword();" style="display: flex; flex-direction: column; gap: 20px;">
                <div class="form-group">
                    <label for="mobileNumber">Mobile Number</label>
                    <div class="input-wrapper">
                        <input id="mobileNumber" type="text" placeholder="Enter mobile number" required autocomplete="tel">
                    </div>
                </div>

                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <div class="input-wrapper">
                        <input id="newPassword" type="password" placeholder="Enter new password" required>
                    </div>
                </div>

                <button type="submit" class="btn-primary">
                    Reset Password
                </button>
            </form>

            <div class="auth-footer">
                Remember your password? <a href="login.html" class="auth-link">Login</a>
            </div>
        </div>
    </div>

    <script src="forget-password.js"></script>
</body>
</html>
