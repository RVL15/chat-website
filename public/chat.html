<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Lounge - AeroChat</title>
    <link rel="stylesheet" href="style.css">
    <script>
        // Inline auth check before page render
        if (!localStorage.getItem("token")) {
            window.location.href = "login.html";
        }
    </script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation & User list -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon">
                    <!-- SVG chat bubble icon -->
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: white;">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                </div>
                <span class="logo-text">AeroChat</span>
            </div>

            <!-- Profile and Logout -->
            <div class="user-profile">
                <div class="profile-info">
                    <div id="userAvatar" class="avatar">
                        U
                        <span class="status-dot"></span>
                    </div>
                    <div class="profile-details">
                        <div id="profileUsername" class="profile-username">Username</div>
                        <div class="profile-status">online</div>
                    </div>
                </div>
                <!-- Logout Button -->
                <button onclick="logout()" class="btn-icon" title="Logout">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </button>
            </div>

            <!-- Online List -->
            <div class="online-section">
                <div class="section-title">
                    <span>Online Users</span>
                    <span id="onlineCount" class="online-badge">0</span>
                </div>
                <div id="usersList" class="users-list">
                    <!-- Dynamic online user elements -->
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-pane">
            <div class="chat-header">
                <h2 class="chat-room-title"># global-lounge</h2>
                <div id="roomStatus" class="chat-room-status">Welcome to the main chat room</div>
            </div>

            <!-- Messages Stream -->
            <div id="messages" class="messages-area">
                <!-- Chat messages go here dynamically -->
            </div>

            <!-- Typing notifications -->
            <div id="typingStatus" class="typing-status-bar"></div>

            <!-- Message Input form -->
            <div class="chat-input-area">
                <form id="chatForm" onsubmit="event.preventDefault(); sendMessage();" class="chat-input-wrapper">
                    <input id="message" type="text" placeholder="Type your message..." autocomplete="off" required>
                    <button type="submit" class="btn-send">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <!-- Socket.IO client library -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
