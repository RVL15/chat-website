<!DOCTYPE html>
<html>
<head>
    <title>Chat Room</title>
</head>
<body>

    <h2>Chat Room</h2>

    <div id="messages"></div>

    <input
        type="text"
        id="message"
        placeholder="Type a message"
    >

    <button onclick="sendMessage()">
        Send
    </button>

    <script>
        if (!localStorage.getItem("token")) {
            window.location.href = "login.html";
        }
    </script>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>

</body>
</html>
